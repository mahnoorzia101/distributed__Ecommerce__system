<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rosélia — Products</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    background:
        linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.58)),
        url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1920&auto=format&fit=crop");
    background-size:cover;
    background-position:left 18%;
}

/* HEADER */
header{
    background:rgba(90, 5, 18, 0.55);
    backdrop-filter:blur(12px);
    padding:22px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Playfair Display',serif;
    font-size:28px;
    letter-spacing:4px;
}

nav a{
    text-decoration:none;
    color:white;
    margin-left:28px;
}

/* LAYOUT */
.wrapper{
    display:flex;
    gap:20px;
    padding:25px;
}

.products-area{ flex:1; }

h1{
    font-family:'Playfair Display',serif;
    font-size:32px;
    text-align:center;
    margin-bottom:18px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:18px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:16px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:370px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
}

/* TITLE */
.card h3{
    font-family:'Playfair Display',serif;
    font-size:18px;
}

/* DESCRIPTION */
.desc{
    font-size:12px;
    opacity:0.65;
    line-height:1.4;
}

/* PRICE + STOCK ROW (IMPORTANT FIX) */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:2px;
}

/* PRICE */
.price{
    font-size:16px;
    font-weight:800;
    color:#ffd6de;
}

/* STOCK */
.stock{
    font-size:11px;
    opacity:0.6;
}

/* BUTTON */
.btn{
    margin-top:auto;
    background:linear-gradient(135deg,#ffe1e7,#ffb6c1);
    color:#7a0c1d;
    border:none;
    padding:10px;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
}

/* CART */
.cart{
    width:300px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:16px;
    padding:15px;
    height:calc(100vh - 120px);
    position:sticky;
    top:20px;
    overflow-y:auto;
}

.cart h2{
    font-family:'Playfair Display',serif;
    margin-bottom:15px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:5px;
}

.remove{ color:#ff9aa2; cursor:pointer; }

</style>
</head>

<body>

<header>
    <div class="logo">ROSÉLIA</div>
    <nav>
        <a href="/">Home</a>
        <a href="/products">Products</a>
    </nav>
    <div id="userBox"></div>
        <script src="/static/auth.js"></script>
</header>

<div class="wrapper">

    <div class="products-area">
        <h1>Our Collection</h1>
        <div id="products" class="grid"></div>
    </div>


    <div class="cart">

    <h2>🛒 Cart</h2>

    <div id="cartItems"></div>

    <hr style="border:1px solid rgba(255,255,255,0.1); margin:10px 0;">

    <h3>
        Total: Rs <span id="total">0</span>
    </h3>

    <button
        id="checkoutBtn"
        class="btn"
        style="width:100%;margin-top:15px;"
        onclick="checkout()"
    >
        Checkout
    </button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(p){
    cart.push(p);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCart();
}
function checkout(){

    if(cart.length===0){

        alert("Cart is empty");

        return;
    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    window.location.href="/checkout";

}


updateCart();

function updateCart(){
    let html = "";
    let total = 0;

    cart.forEach((item,i)=>{
        total += Number(item.price);

        html += `
        <div class="cart-item">
            <span>${item.name}</span>
            <span>Rs ${item.price}</span>
            <span class="remove" onclick="removeItem(${i})">x</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = html;
    document.getElementById("total").innerText = total;
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
    localStorage.setItem("cart", JSON.stringify(cart));
}

fetch("http://localhost:5000/api/products")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("products");

    data.forEach(p => {

        container.innerHTML += `
        <div class="card">

            <img src="${p.image_url}" />

            <h3>${p.name}</h3>

            <p class="desc">${p.description}</p>

            <div class="row">
                <div class="price">Rs ${p.price}</div>
                <div class="stock">Stock: ${p.stock}</div>
            </div>

            <button class="btn" onclick='addToCart(${JSON.stringify(p)})'>
                Add to Cart
            </button>

        </div>`;
    });
});

updateCart();

</script>


</body>
</html>
