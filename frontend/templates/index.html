<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosélia — Luxury Flower Boutique</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            color:white;

            min-height:100vh;
            overflow-x:hidden;

            /* FLOWER BACKGROUND */
            background:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.58)
                ),

                url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1920&auto=format&fit=crop");

            background-size:cover;
            background-repeat:no-repeat;

            /* MOVED FLOWER MORE LEFT */
            background-position:left 18%;
        }

        /* soft luxury glow */
        body::before{
            content:"";
            position:fixed;
            inset:0;

            background:
                radial-gradient(circle at top left,
                rgba(255,255,255,0.08),
                transparent 30%),

                radial-gradient(circle at bottom right,
                rgba(255,182,193,0.10),
                transparent 35%);

            pointer-events:none;
        }

        /* HEADER */

        header{
            background:rgba(90, 5, 18, 0.55);

            backdrop-filter:blur(12px);

            padding:22px 60px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            border-bottom:1px solid rgba(255,255,255,0.10);
        }

        .logo{
            font-family:'Playfair Display',serif;

            font-size:30px;

            letter-spacing:4px;

            color:white;
        }

        nav a{
            text-decoration:none;

            color:white;

            margin-left:28px;

            font-weight:500;

            transition:0.35s;
        }

        nav a:hover{
            color:#ffd6de;
        }

        /* HERO */

        .hero{
            min-height:82vh;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            text-align:center;

            /* TEXT MORE ABOVE */
            padding-top:90px;
            padding-left:20px;
            padding-right:20px;
        }

        .hero-content{
            max-width:950px;
        }

        .hero h1{
            font-family:'Playfair Display',serif;

            font-size:88px;

            line-height:1.02;

            font-weight:600;

            margin-bottom:24px;

            color:white;

            text-shadow:
                0 12px 40px rgba(0,0,0,0.50);
        }

        .hero p{
            font-size:20px;

            color:rgba(255,255,255,0.88);

            line-height:1.8;

            margin-bottom:40px;

            letter-spacing:0.5px;
        }

        /* BUTTON */

        .btn{
            background:
                linear-gradient(
                    135deg,
                    #ffe1e7,
                    #ffb6c1
                );

            color:#7a0c1d;

            border:none;

            padding:16px 38px;

            border-radius:50px;

            font-size:15px;
            font-weight:600;

            cursor:pointer;

            transition:0.4s;

            box-shadow:
                0 14px 40px rgba(0,0,0,0.35);
        }

        .btn:hover{
            transform:
                translateY(-4px)
                scale(1.03);

            background:white;

            box-shadow:
                0 18px 50px rgba(0,0,0,0.45);
        }

        /* FOOTER */

        footer{
            text-align:center;

            padding:65px 20px 35px;

            background:transparent;

            color:rgba(255,255,255,0.72);

            font-size:14px;

            margin-top:50px;
        }

        /* RESPONSIVE */

        @media(max-width:950px){

            .hero{
                padding-top:70px;
            }

            .hero h1{
                font-size:60px;
            }

            .hero p{
                font-size:17px;
            }

            header{
                padding:20px 25px;
            }
        }

    </style>
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            ROSÉLIA
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="/products">Products</a>
        </nav>
       <div id="userBox"></div>
         <script src="/static/auth.js"></script>
    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                Luxury Flowers,<br>
                Crafted for Emotion
            </h1>

            <p>
                Premium Quality • Fresh Flowers • Pure 
            </p>

            <a href="/products">
                <button class="btn">
                    Explore Collection
                </button>
            </a>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>
        © 2026 Rosélia | Luxury Flower Boutique • Designed by M.A.L
    </footer>
</body>
</html>
