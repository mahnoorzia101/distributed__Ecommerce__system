<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout | Rosélia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
color:white;
min-height:100vh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),

url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1920");

background-size:cover;
}

.container{
max-width:1100px;
margin:auto;
padding:50px 30px;
}

.title{

font-family:'Playfair Display';
font-size:52px;
margin-bottom:40px;
text-align:center;

}

.wrapper{
display:grid;
grid-template-columns:1fr 400px;
gap:30px;
}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

padding:30px;

border-radius:25px;

border:1px solid rgba(255,255,255,.1);

}

h2{
margin-bottom:25px;
}

.input{

width:100%;
padding:15px;
margin-bottom:15px;

border:none;

border-radius:12px;

background:rgba(255,255,255,.12);

color:white;
}

.input::placeholder{
color:#ddd;
}

.total{
font-size:28px;
margin:30px 0;
}

button{

width:100%;
padding:16px;

border:none;

border-radius:40px;

cursor:pointer;

font-weight:600;

background:
linear-gradient(
135deg,
#ffe1e7,
#ffb6c1
);

color:#7a0c1d;

font-size:16px;
}

button:hover{
transform:scale(1.02);
}

@media(max-width:900px){

.wrapper{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Checkout
</div>

<div class="wrapper">

<div class="card">

<h2>Shipping Information</h2>

<input class="input" placeholder="Full Name">
<input class="input" placeholder="Email">

<input class="input" placeholder="Phone Number">

<input class="input" placeholder="Address Line">

<input class="input" placeholder="City">

<input class="input" placeholder="Postal Code">

<textarea
class="input"
rows="4"
placeholder="Delivery Notes"
></textarea>

</div>


<div class="card">

<h2>Order Summary</h2>

<p id="price"></p>

<div class="total">
Total: Rs <span id="total"></span>
</div>

<button onclick="proceed()">
Proceed To Payment
</button>

</div>

</div>

</div>


<script>
// 1. Capture the dynamic Gateway URL injected by your Flask backend
const gatewayUrl = "{{ gateway_url }}";

const cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item => {
    total += Number(item.price);
});

document.getElementById("price").innerHTML = cart.length + " item(s)";
document.getElementById("total").innerText = total;

function proceed() {
    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    // 2. Fetch the actual logged-in user from session storage
    const sessionUser = JSON.parse(sessionStorage.getItem("user"));
    
    // Fallback block if someone tests checkout without signing in first
    if (!sessionUser || (!sessionUser.id && !sessionUser.user_id)) {
        alert("Please log in to complete your checkout purchase.");
        window.location.href = "/login";
        return;
    }

    // Extract user ID safely handling both common API response shapes (id or user_id)
    const activeUserId = sessionUser.id || sessionUser.user_id;

    // Grab button for loading visual state management
    const proceedBtn = document.getElementById("checkoutBtn");
    if (proceedBtn) {
        proceedBtn.disabled = true;
        proceedBtn.innerText = "Processing Order...";
    }

    // 3. Dynamically point the checkout execution payload to your cloud Gateway
    fetch(`${gatewayUrl}/api/checkout`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: activeUserId,
            // Maps your current cart data structure neatly down to your backend model schema
            product_id: cart[0].id 
        })
    })
    .then(r => {
        if (!r.ok) {
            throw new Error(`HTTP error! status: ${r.status}`);
        }
        return r.json();
    })
    .then(data => {
        if (data.error) {
            alert(data.error);
            if (proceedBtn) {
                proceedBtn.disabled = false;
                proceedBtn.innerText = "Checkout";
            }
            return;
        }

        // Cache the transaction variables securely before executing checkout handoff
        localStorage.setItem("order_id", data.order_id);
        localStorage.setItem("amount", total);

        // Advance client to payment routing window
        window.location.href = "/payment/" + data.order_id;
    })
    .catch((err) => {
        console.error("Checkout transaction failure:", err);
        alert("Checkout failed. Connection to order orchestration mesh refused.");
        if (proceedBtn) {
            proceedBtn.disabled = false;
            proceedBtn.innerText = "Checkout";
        }
    });
}
</script>

</body>
</html>
