<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

body{

font-family:Inter;
color:white;

background:
linear-gradient(
rgba(0,0,0,.6),
rgba(0,0,0,.7)
),

url("https://images.unsplash.com/photo-1563245372-f21724e3856d");

background-size:cover;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.box{

width:500px;

padding:40px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border-radius:30px;

text-align:center;

}

h1{

font-family:'Playfair Display';

margin-bottom:30px;

}

.info{

padding:25px;

margin-bottom:30px;

background:rgba(255,255,255,.1);

border-radius:15px;

}

.input{

width:100%;
padding:14px;
margin-bottom:15px;

border:none;
border-radius:10px;
background:rgba(255,255,255,.1);

color:white;
}

button{

width:100%;
padding:16px;

border:none;

border-radius:40px;

background:#ffcad5;

cursor:pointer;

font-weight:600;

}

</style>
</head>

<body>

<div class="box">

<h1>Payment</h1>

<div
id="info"
class="info">
</div>

<input
class="input"
placeholder="Card Holder Name">

<input
class="input"
placeholder="Card Number">

<input
class="input"
placeholder="MM/YY">

<input
class="input"
placeholder="CVV">

<button onclick="pay()">
Confirm Payment
</button>

</div>

<script>
// 1. Capture the dynamic Gateway URL injected by your Flask backend
const gatewayUrl = "{{ gateway_url }}";

const path = window.location.pathname;
const orderId = path.split("/").pop();
const amount = localStorage.getItem("amount") || "0";

document.getElementById("info").innerHTML = `
    Order #${orderId}
    <br><br>
    Amount: Rs ${amount}
`;

function pay(){
    // Grab the button component for visual load state handling
    const payBtn = document.querySelector("button");
    if (payBtn) {
        payBtn.disabled = true;
        payBtn.innerText = "Verifying Transaction...";
    }

    // 2. Dynamically route the transaction payload straight to your live cloud cluster
    fetch(`${gatewayUrl}/api/pay`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            order_id: Number(orderId), // Enforces integer casting for strict DB queries
            amount: Number(amount)
        })
    })
    .then(r => {
        if (!r.ok) {
            throw new Error(`HTTP error! status: ${r.status}`);
        }
        return r.json();
    })
    .then(data => {
        // 3. Case-insensitive normalization check to avoid data-type mismatches
        const paymentStatus = (data.status || "").toLowerCase();

        if (paymentStatus === "success" || data.message?.toLowerCase().includes("success")) {
            // Clean up transaction cache tokens cleanly before redirecting
            localStorage.removeItem("amount");
            localStorage.removeItem("order_id");
            localStorage.removeItem("cart");
            
            window.location.href = "/success";
        } else {
            alert(data.error || data.message || "Payment declined by vendor bank service.");
            if (payBtn) {
                payBtn.disabled = false;
                payBtn.innerText = "Confirm Payment";
            }
        }
    })
    .catch((err) => {
        console.error("Payment clearing execution error:", err);
        alert("Payment processing failed. Connection to payment validation cluster timed out.");
        if (payBtn) {
            payBtn.disabled = false;
            payBtn.innerText = "Confirm Payment";
        }
    });
}
</script>

</body>
</html>
