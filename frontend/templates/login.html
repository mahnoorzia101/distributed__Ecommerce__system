<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rosélia | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
        url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1920&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    color:white;
}

/* soft glow */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,182,193,0.10), transparent 40%);

    pointer-events:none;
}

/* LOGIN BOX */
.login-box{
    width:420px;
    padding:40px;

    background:rgba(90, 5, 18, 0.45);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;

    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    text-align:center;
}

.logo{
    font-family:'Playfair Display',serif;
    font-size:32px;
    letter-spacing:4px;
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    color:rgba(255,255,255,0.75);
    margin-bottom:30px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px 16px;
    margin-bottom:16px;

    border:none;
    border-radius:10px;

    outline:none;
    font-size:14px;

    background:rgba(255,255,255,0.10);
    color:white;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

/* BUTTON */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:50px;

    background:linear-gradient(135deg, #ffe1e7, #ffb6c1);
    color:#7a0c1d;

    font-weight:600;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    background:white;
}

/* FOOTER TEXT */
.extra{
    margin-top:18px;
    font-size:13px;
    color:rgba(255,255,255,0.7);
}

.extra a{
    color:#ffd6de;
    text-decoration:none;
}

.extra a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">ROSÉLIA</div>
    <div class="subtitle">Welcome back — login to continue</div>

    <form id="loginForm">

        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>
    

    <div class="extra">
        Don’t have an account? <a href="/register">Register</a>
    </div>

</div>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const res = await fetch("http://localhost:5000/api/user/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    if(res.ok){
        sessionStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/";
    } else {
        alert(data.message);
    }
});
</script>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const res = await fetch("http://localhost:5000/api/user/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if(res.ok){
        alert("Login successful!");
        console.log(data);
    } else {
        alert(data.message || "Login failed");
    }
});
</script>

</body>
</html>
